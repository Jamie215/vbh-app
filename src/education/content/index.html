  <body>
    <div id="app"></div>
    <script type="text/javascript">
  (function(root) {
    window.partnerContent = [];

    function isExport() {
      return true;
    }

    function resolvePath(path) {
      return ('assets/').concat(path);
    }

    function resolveFontPath(font) {
      return ('lib/fonts/').concat(font.key.split('/').reverse()[0]);
    }

    root.Runtime = {
      fetch: window.__fetchCourse,
      isExport: isExport,
      resolvePath: resolvePath,
      resolveFontPath: resolveFontPath,

      getProgress: function(defaults) {
        try {
          var saved = window.parent.eduProgress;
          console.log('[EDU] getProgress called');
          console.log('[EDU]   defaults:', typeof defaults, defaults ? Object.keys(defaults) : 'null');
          console.log('[EDU]   saved:', typeof saved, saved);
          if (saved && typeof saved === 'object' && Object.keys(saved).length > 0) {
            console.log('[EDU]   → returning SAVED');
            return saved;
          }
        } catch(e) {
          console.error('[EDU] getProgress error:', e);
        }
        console.log('[EDU]   → returning DEFAULTS');
        return defaults;
      },

      setCourseProgress: function(arg1, arg2) {
        console.log('[EDU] setCourseProgress arg1:', typeof arg1, arg1);
        console.log('[EDU] setCourseProgress arg2:', typeof arg2, arg2);
        return arg1;
      },

      setLessonProgress: function(progress) {
        console.log('[EDU] setLessonProgress:', typeof progress, progress ? Object.keys(progress) : 'null');
        return progress;
      },

      setLessonComplete: function(progress) {
        console.log('[EDU] setLessonComplete:', typeof progress, progress ? Object.keys(progress) : 'null');
        return progress;
      },

      bookmark: function(lessonId) {
        console.log('[EDU] bookmark:', lessonId);
        try { window.parent.saveEducationBookmark(lessonId); }
        catch(e) {}
      },

      isComplete: function() {
        return false;
      },

      finish: function(progress) {
        console.log('[EDU] finish:', typeof progress, progress);
      }
    };
  }(window));
</script>

    
    <script>__loadEntry()</script>
