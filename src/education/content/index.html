  <body>
    <div id="app"></div>
    <script type="text/javascript">
       (function(root) {
        window.partnerContent = [];

        function isExport() {
          return true;
        }

        function resolvePath(path) {
          return ('assets/').concat(path);
        }

        function resolveFontPath(font) {
          return ('lib/fonts/').concat(font.key.split('/').reverse()[0]);
        }

        root.Runtime = {
          fetch: window.__fetchCourse,
          isExport: isExport,
          resolvePath: resolvePath,
          resolveFontPath: resolveFontPath,

          getProgress: function(defaults) {
            try {
              var saved = window.parent.eduProgress;
              if (saved && typeof saved === 'object' && saved.lessons) {
                var copy = JSON.parse(JSON.stringify(saved));
                delete copy.currentLesson;
                return copy;
              }
            } catch(e) {}
            return defaults;
          },

          setCourseProgress: function(progress) {
            try { window.parent.saveEducationProgress(progress); }
            catch(e) {}
            return progress;
          },

          setLessonProgress: function(progress) {
            return progress;
          },

          setLessonComplete: function(progress) {
            return progress;
          },

          bookmark: function(lessonId) {
            try { window.parent.saveEducationBookmark(lessonId); }
            catch(e) {}
          },

          isComplete: function() {
            try {
              var saved = window.parent.eduProgress;
              return saved ? saved.percentComplete === 100 : false;
            } catch(e) {
              return false;
            }
          },

          finish: function() {}
        };
      }(window));
    </script>

    
    <script>__loadEntry()</script>

  </body>
